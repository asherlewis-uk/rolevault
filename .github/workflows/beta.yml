name: Beta Build & TestFlight

on:
  push:
    branches:
      - main

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8

jobs:
  beta:
    name: Build and Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Xcode and Swift
        run: |
          echo "Xcode path: $(xcode-select -p)"
          xcodebuild -version
          echo ""
          swift --version

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: ios/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('ios/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install Ruby dependencies
        working-directory: ios
        run: |
          gem install bundler --no-document
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Generate Xcode project
        working-directory: ios
        run: |
          if command -v xcodegen &> /dev/null; then
            xcodegen generate
          else
            echo "⚠️ xcodegen not found. Attempting brew install..."
            brew install xcodegen
            xcodegen generate
          fi

      - name: Setup Match SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.MATCH_SSH_PRIVATE_KEY }}"
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Run Fastlane beta
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
        run: bundle exec fastlane beta
