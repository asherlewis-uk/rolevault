networks:
  server_internal:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: rolevault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rolevault
      POSTGRES_PASSWORD: rolevault
      POSTGRES_DB: rolevault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rolevault"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - server_internal

  api:
    build: .
    container_name: rolevault-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rolevault:rolevault@postgres:5432/rolevault?options=-c%20search_path%3Drolevault
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      INFERENCE_URL: ${INFERENCE_URL:-http://host.docker.internal:1234}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - server_internal

volumes:
  postgres_data:
